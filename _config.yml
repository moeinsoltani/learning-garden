title: Learning Garden
description: A hands-on learning journal — Linux systems, engineering leadership, English, Canada, and the trees & birds of Canada
remote_theme: just-the-docs/just-the-docs@v0.10.0

baseurl: "/learning-garden"
url: "https://moeinsoltani.github.io"

color_scheme: dark
search_enabled: true
heading_anchors: true
back_to_top: true
back_to_top_text: "Back to top"

footer_content: "Learning Garden"

# Callout blocks used throughout the lessons ({: .note } etc.). Just the Docs
# only styles callouts that are declared here — without this block they render
# as plain unstyled paragraphs.
callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: red
  important:
    title: Important
    color: yellow

# Apply the Just the Docs theme layout to every file (regular pages AND the
# documents in the networking/virtualization collections). Collection documents
# do NOT inherit a layout automatically, so without this they render as bare,
# unthemed HTML. An empty `path` scope matches all pages and collection docs.
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Three learning tracks, each its own Just the Docs navigation section.
# Permalink keeps the in-collection path (e.g. lessons/lesson-NN) so the
# existing relative phase→lesson links keep resolving.
collections:
  networking:
    permalink: "/:collection/:path:output_ext"
    output: true
  virtualization:
    permalink: "/:collection/:path:output_ext"
    output: true
  security:
    permalink: "/:collection/:path:output_ext"
    output: true
  os:
    permalink: "/:collection/:path:output_ext"
    output: true
  leadership:
    permalink: "/:collection/:path:output_ext"
    output: true
  english:
    permalink: "/:collection/:path:output_ext"
    output: true
  canada:
    permalink: "/:collection/:path:output_ext"
    output: true
  nature:
    permalink: "/:collection/:path:output_ext"
    output: true

just_the_docs:
  collections:
    networking:
      name: Linux Networking
      nav_fold: true
    virtualization:
      name: Linux Virtualization
      nav_fold: true
    security:
      name: Security & Identity
      nav_fold: true
    os:
      name: Operating Systems
      nav_fold: true
    leadership:
      name: Engineering Leadership
      nav_fold: true
    english:
      name: English for Work
      nav_fold: true
    canada:
      name: "Canada: History & Civics"
      nav_fold: true
    nature:
      name: "Trees & Birds of Canada"
      nav_fold: true

exclude:
  - CLAUDE.md
  - "*.sh"

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
